function initAudio() {
    try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
}

function playSound(type) {
    if(!audioCtx) return;
    try {
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.connect(g);
        g.connect(audioCtx.destination);
        var t = audioCtx.currentTime;
        if(type==='shoot'){
            o.frequency.setValueAtTime(600,t);
            o.frequency.exponentialRampToValueAtTime(200,t+0.08);
            g.gain.setValueAtTime(0.1,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
            o.start(t);o.stop(t+0.08);
        } else if(type==='hit'){
            o.frequency.setValueAtTime(300,t);
            o.frequency.exponentialRampToValueAtTime(80,t+0.12);
            g.gain.setValueAtTime(0.12,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
            o.start(t);o.stop(t+0.12);
        } else if(type==='pickup'){
            o.frequency.setValueAtTime(520,t);
            o.frequency.setValueAtTime(780,t+0.08);
            g.gain.setValueAtTime(0.08,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
            o.start(t);o.stop(t+0.15);
        } else if(type==='teleport'){
            o.type='sine';
            o.frequency.setValueAtTime(400,t);
            o.frequency.exponentialRampToValueAtTime(1200,t+0.25);
            g.gain.setValueAtTime(0.1,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
            o.start(t);o.stop(t+0.35);
        } else if(type==='explosion'){
            o.type='sawtooth';
            o.frequency.setValueAtTime(100,t);
            o.frequency.exponentialRampToValueAtTime(30,t+0.35);
            g.gain.setValueAtTime(0.2,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
            o.start(t);o.stop(t+0.35);
        }
    } catch(e) {}
}

function handleStartClick() {
    console.log('[GAME] Start clicked!');
    initAudio();
    document.getElementById('startModal').style.display='none';
    document.getElementById('uiOverlay').style.display='flex';
    document.getElementById('weaponPanel').style.display='flex';
    document.getElementById('skillPanel').style.display='flex';
    document.getElementById('inventoryPanel').style.display='flex';
    document.getElementById('controlsHint').style.display='block';
    document.getElementById('levelIndicator').style.display='block';
    document.getElementById('minimapCanvas').style.display='block';
    running=true;
    loadLevel(0);
    buildUI();
    loop();
    showStory(LEVELS[0].story);
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
}

function loadLevel(idx) {
    curLevel=idx;
    var lv=LEVELS[idx];
    gameMap=lv.map.map(function(r){return r.split('')});
    bullets=[];enemies=[];particles=[];items=[];dmgTexts=[];
    hasBoss=false;
    player.x=lv.start.x*TS+TS/2;
    player.y=lv.start.y*TS+TS/2;

    lv.enemies.forEach(function(d){
        enemies.push(makeEnemy(d));
        if(d.boss) hasBoss=true;
    });

    lv.items.forEach(function(d){
        items.push({t:d.type,x:d.x*TS+TS/2,y:d.y*TS+TS/2,got:false,r:12});
    });

    document.getElementById('levelIndicator').textContent=lv.name;
    updateUI();
    updateMinimap();
    document.getElementById('bossHealthBar').style.display=hasBoss?'block':'none';
    shake={amp:0,dur:0};
}

function makeEnemy(d){
    var e={
        type:d.type,x:d.x*TS+TS/2,y:d.y*TS+TS/2,
        hp:d.hp||30,maxHp:d.hp||30,
        spd:d.spd||1.5,r:d.boss?32:22,
        boss:d.boss||false,dmg:d.dmg||8,
        pattern:d.pattern||'chase',lastAtk:0,atkCD:1500,
        angle:0,slowT:0,flash:0
    };
    switch(d.type){
        case'ghost':e.c='rgba(180,180,220,0.7)';e.e='👻';e.spd=d.spd||2;break;
        case'virus':e.c='#00ff88';e.e='🦠';e.spd=d.spd||2.5;break;
        case'spider':e.c='#8b4513';e.e='🕷️';e.r=d.boss?38:26;break;
        case'squid':e.c='#e17055';e.e='🦑';e.r=d.boss?38:26;break;
        case'plane':e.c='#74b9ff';e.e='✈️';e.r=d.boss?36:26;break;
        case'lightning':e.c='#ffeaa7';e.e='⚡';e.r=d.boss?36:26;break;
        case'ice_ghost':e.c='#81ecec';e.e='🧊';e.spd=d.spd||2.5;break;
        case'magma':e.c='#e74c3c';e.e='🌋';e.r=d.boss?40:28;break;
        case'tank':e.c='#27ae60';e.e='🛡️';e.r=30;e.spd=d.spd||1.2;e.atkCD=2000;break;
        case'doppel':e.c='#b2bec3';e.e='👤';e.spd=d.spd||3.0;break;
        case'energy':e.c='#a29bfe';e.e='⚽';e.spd=d.spd||2.5;break;
        case'elite':e.c='#d63031';e.e='💂';e.r=26;break;
        case'octopus':e.c='#9b59b6';e.e='🐙';e.r=46;e.atkCD=2000;break;
        default:e.c='#ff6b6b';e.e='👾';
    }
    return e;
}

function buildUI(){
    var wp=document.getElementById('weaponPanel');wp.innerHTML='';
    weapons.forEach(function(w,i){
        var s=document.createElement('div');
        s.className='weapon-slot'+(i===player.wep?' active':'')+(w.ok?'':' locked');
        s.innerHTML=w.e+'<span>'+w.n+'</span>';
        s.onclick=function(){if(w.ok){player.wep=i;buildUI();}};
        wp.appendChild(s);
    });
    var sp=document.getElementById('skillPanel');sp.innerHTML='';
    skills.forEach(function(sk){
        var s=document.createElement('div');
        s.className='skill-slot'+(sk.ok?'':' locked');
        s.style.opacity=sk.ok?'1':'0.35';
        s.innerHTML=sk.e+'<span>'+sk.k+'</span>';
        sp.appendChild(s);
    });
    var ip=document.getElementById('inventoryPanel');ip.innerHTML='';
    document.getElementById('controlsHint').innerHTML='🎮 WASD/方向键 移动 | 🖱️ 鼠标射击 | Q/W/E/R/T 技能 | 1-5 切换武器';
}

function loop(){if(!running)return;update();render();requestAnimationFrame(loop);}

function update(){
    handleInput();
    movePlayer();
    updateBullets();
    updateEnemies();
    updateItems();
    updateParticles();
    updateDamageTexts();
    updateUI();
    updateBossHP();
    checkWin();
}

function handleInput(){
    var dx=0,dy=0;
    if(keys['ArrowUp']||keys['KeyW'])dy-=1;
    if(keys['ArrowDown']||keys['KeyS'])dy+=1;
    if(keys['ArrowLeft']||keys['KeyA'])dx-=1;
    if(keys['ArrowRight']||keys['KeyD'])dx+=1;
    if(dx&&dy){dx*=0.707;dy*=0.707;}
    var sm=1;
    if(LEVELS[curLevel].theme==='ice')sm=0.75;
    if(player.slowT>0)sm*=0.5;
    player.mx=dx*player.speed*sm;
    player.my=dy*player.speed*sm;
    if(keys['Digit1'])player.wep=0;
    if(keys['Digit2'])player.wep=1;
    if(keys['Digit3'])player.wep=2;
    if(keys['Digit4'])player.wep=3;
    if(keys['Digit5'])player.wep=4;
    if(keys['KeyQ']&&skills[0].ok&&player.dashCD<=0)doDash();
    if(keys['KeyW']&&skills[1].ok&&player.shieldT<=0)doShield();
    if(keys['KeyE']&&skills[2].ok&&player.slowCD<=0)doSlow();
    if(keys['KeyR']&&skills[3].ok&&player.healCD<=0)doHeal();
    if(keys['KeyT']&&skills[4].ok&&player.aoeCD<=0)doAOE();
}

function movePlayer(){
    if(player.mx||player.my){
        var nx=player.x+player.mx;
        var ny=player.y+player.my;
        if(!wallCollide(nx,player.y,player.r))player.x=nx;
        if(!wallCollide(player.x,ny,player.r))player.y=ny;
    }
    if(player.inv){player.invT--;if(player.invT<=0)player.inv=false;}
    if(player.shield){player.shieldT--;if(player.shieldT<=0)player.shield=false;}
    if(player.dashCD>0)player.dashCD-=16;
    if(player.slowCD>0)player.slowCD-=16;
    if(player.healCD>0)player.healCD-=16;
    if(player.aoeCD>0)player.aoeCD-=16;
    if(LEVELS[curLevel].theme==='volcano'){
        var tx=Math.floor(player.x/TS),ty=Math.floor(player.y/TS);
        if(ty>=0&&ty<gameMap.length&&tx>=0&&tx<gameMap[0].length){
            if(gameMap[ty][tx]==='^')player.hp-=0.08;
            if(gameMap[ty][tx]==='T'){
                var spots=[];
                for(var sy=1;sy<gameMap.length-1;sy++)for(var sx=1;sx<gameMap[0].length-1;sx++){if(gameMap[sy][sx]!=='#'&&gameMap[sy][sx]!=='T'&&Math.hypot((sx*TS+TS/2)-player.x,(sy*TS+TS/2)-player.y)>100)spots.push({x:sx,y:sy});}
                if(spots.length>0){var dest=spots[Math.floor(Math.random()*spots.length)];player.x=dest.x*TS+TS/2;player.y=dest.y*TS+TS/2;playSound('teleport');shake={amp:6,dur:300};for(var pi=0;pi<20;pi++)particles.push({x:player.x,y:player.y,c:'#a29bfe',vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:30,type:'teleport'});console.log('[TELEPORT] 传送至 ('+dest.x+','+dest.y+')');}
            }
        }
    }
}

function wallCollide(x,y,r){
    var pts=[
        {x:x-r,y:y-r},{x:x+r,y:y-r},
        {x:x-r,y:y+r},{x:x+r,y:y+r},
        {x:x,y:y-r},{x:x,y:y+r},{x:x-r,y:y},{x:x+r,y:y}
    ];
    for(var p of pts){
        var tx=Math.floor(p.x/TS),ty=Math.floor(p.y/TS);
        if(ty<0||ty>=gameMap.length||tx<0||tx>=gameMap[0].length)return true;
        if(gameMap[ty][tx]==='#')return true;
    }
    return false;
}

canvas.addEventListener('mousemove',function(e){
    var r=canvas.getBoundingClientRect();
    mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
});
canvas.addEventListener('mousedown',function(e){shoot();});

function shoot(){
    var w=weapons[player.wep];
    if(!w.ok)return;
    var now=Date.now();
    if(now-lastFire<w.rate)return;
    lastFire=now;
    var ang=Math.atan2(mouse.y-player.y,mouse.x-player.x);
    for(var i=0;i<w.cnt;i++){
        var sa=ang+(Math.random()-0.5)*w.spread*2;
        bullets.push({
            x:player.x,y:player.y,
            vx:Math.cos(sa)*w.spd,vy:Math.sin(sa)*w.spd,
            dmg:w.dmg,r:w.expl?6:4,color:w.c,expl:w.expl||false,life:120
        });
    }
    for(var j=0;j<5;j++)particles.push({x:player.x,y:player.y,c:w.c,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15,type:'muzzle'});
    playSound('shoot');
}

function updateBullets(){
    for(var i=bullets.length-1;i>=0;i--){
        var b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
        var tx=Math.floor(b.x/TS),ty=Math.floor(b.y/TS);
        if(b.life<=0||ty<0||ty>=gameMap.length||tx<0||tx>=gameMap[0].length||gameMap[ty][tx]==='#'){
            if(b.expl){
                explode(b.x,b.y,60);playSound('explosion');
                enemies.forEach(function(en){
                    var dist=Math.hypot(en.x-b.x,en.y-b.y);
                    if(dist<100){en.hp-=b.dmg*(1-dist/100);en.flash=10;showDmg(Math.round(b.dmg*(1-dist/100)),en.x,en.y);if(en.hp<=0)killEn(en);}
                });
            }
            bullets.splice(i,1);continue;
        }
        for(var j=enemies.length-1;j>=0;j--){
            var en=enemies[j];
            if(Math.hypot(en.x-b.x,en.y-b.y)<en.r+b.r+8){
                en.hp-=b.dmg;en.flash=10;showDmg(b.dmg,en.x,en.y);
                console.log('[HIT] 怪物HP: '+en.hp+'/'+en.maxHp+' | 伤害:'+b.dmg);
                if(en.hp<=0){killEn(en);console.log('[KILL] 怪物已死亡!');}
                for(var k=0;k<6;k++)particles.push({x:b.x,y:b.y,c:'#ffff00',vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:12,type:'hit'});
                playSound('hit');
                bullets.splice(i,1);break;
            }
        }
    }
}

function updateEnemies(){
    enemies.forEach(function(en){
        if(en.slowT>0)en.slowT--;
        var spd=en.slowT>0?en.spd*0.4:en.spd;
        var dx=player.x-en.x,dy=player.y-en.y;
        var dist=Math.hypot(dx,dy);
        var ang=Math.atan2(dy,dx);

        if(en.pattern==='chase'||en.pattern==='web'||en.pattern==='ink'){
            if(dist>60){
                en.x+=Math.cos(ang)*spd;
                en.y+=Math.sin(ang)*spd;
                if(wallCollide(en.x,en.y,en.r)){
                    en.x-=Math.cos(ang)*spd;
                    en.y-=Math.sin(ang)*spd;
                    en.angle+=0.3;
                    en.x+=Math.cos(en.angle)*spd;
                    en.y+=Math.sin(en.angle)*spd;
                }
            }
        } else if(en.pattern==='bomb'){
            en.x+=Math.cos(en.angle||ang)*spd*0.6;
            en.y+=Math.sin(en.angle||ang)*spd*0.6;
            en.angle=(en.angle||0)+0.02;
            if(Math.random()<0.02){
                bullets.push({x:en.x,y:en.y,vx:(Math.random()-0.5)*3,vy:4,dmg:en.dmg,r:5,color:'#ff6b6b',expl:true,life:80,isEnemy:true});
            }
        } else if(en.pattern==='zap'){
            if(dist<200&&Date.now()-en.lastAtk>en.atkCD){
                en.lastAtk=Date.now();
                var bAng=Math.atan2(player.y-en.y,player.x-en.x);
                bullets.push({x:en.x,y:en.y,vx:Math.cos(bAng)*12,vy:Math.sin(bAng)*12,dmg:en.dmg,r:3,color:'#ffeaa7',life:40,isEnemy:true});
            }
            if(dist>80){en.x+=Math.cos(ang)*spd*0.5;en.y+=Math.sin(ang)*spd*0.5;}
        } else if(en.pattern==='mirror'){
            var mx2=0,my2=0;
            if(keys['ArrowUp']||keys['KeyW'])my2-=1;
            if(keys['ArrowDown']||keys['KeyS'])my2+=1;
            if(keys['ArrowLeft']||keys['KeyA'])mx2-=1;
            if(keys['ArrowRight']||keys['KeyD'])mx2+=1;
            if(mx2||my2){en.x+=mx2*spd;en.y+=my2*spd;}
        } else if(en.pattern==='bounce'){
            en.x+=Math.cos(en.angle)*spd;
            en.y+=Math.sin(en.angle)*spd;
            if(wallCollide(en.x,en.y,en.r)){en.angle+=(Math.random()-0.6)*Math.PI;}
        } else if(en.pattern==='lava'){
            if(dist>100){en.x+=Math.cos(ang)*spd*0.5;en.y+=Math.sin(ang)*spd*0.5;}
            if(Date.now()-en.lastAtk>2000){
                en.lastAtk=Date.now();
                for(var bi=0;bi<8;bi++){
                    var ba=bi*Math.PI/4;
                    bullets.push({x:en.x,y:en.y,vx:Math.cos(ba)*4,vy:Math.sin(ba)*4,dmg:8,r:4,color:'#e74c3c',life:50,isEnemy:true});
                }
            }
        } else if(en.pattern==='ultimate'){
            if(dist>120){en.x+=Math.cos(ang)*spd*0.4;en.y+=Math.sin(ang)*spd*0.4;}
            en.angle+=0.01;
            if(Date.now()-en.lastAtk>en.atkCD){
                en.lastAtk=Date.now();
                for(var bi2=0;bi2<12;bi2++){
                    var ba2=en.angle+bi2*Math.PI/6;
                    bullets.push({x:en.x,y:en.y,vx:Math.cos(ba2)*5,vy:Math.sin(ba2)*5,dmg:12,r:5,color:'#9b59b6',life:60,isEnemy:true});
                }
                shake={amp:8,dur:300};
            }
        }

        if(!wallCollide(en.x,en.y,en.r)==false){
        }

        if(dist<player.r+en.r&&!player.inv&&!player.shield){
            player.hp-=en.dmg*0.03;
            player.inv=true;player.invT=30;
            shake={amp:5,dur:200};
            playSound('damage');
            if(player.hp<=0)gameOver();
        }

        if(en.flash>0)en.flash--;
    });
}

function killEn(en){
    var idx=enemies.indexOf(en);
    if(idx>-1){enemies.splice(idx,1);kills++;score+=en.boss?500:100;playSound('pickup');}
    for(var i=0;i<15;i++)particles.push({x:en.x,y:en.y,c:en.c,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,type:'death'});
    if(en.boss){
        hasBoss=false;
        document.getElementById('bossHealthBar').style.display='none';
        score+=1000;
    }
}

function explode(x,y,count){
    for(var i=0;i<count;i++){
        var a=Math.random()*Math.PI*2;
        particles.push({x:x,y:y,c:'#ff6b6b',vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:20+Math.random()*20,type:'explosion'});
    }
}

function updateItems(){
    items.forEach(function(it){
        if(it.got)return;
        var d=Math.hypot(it.x-player.x,it.y-player.y);
        if(d<player.r+it.r){
            it.got=true;score+=25;playSound('pickup');
            handlePickup(it.t);
            for(var i=0;i<10;i++)particles.push({x:it.x,y:it.y,c:'#ffd700',vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,type:'pickup'});
        }
    });
}

function handlePickup(type){
    switch(type){
        case'coin':score+=50;break;
        case'health':player.hp=Math.min(player.maxHp,player.hp+30);break;
        case'sword':weapons[2].ok=true;break;
        case'shotgun':weapons[2].ok=true;break;
        case'smg':weapons[1].ok=true;break;
        case'rocket':weapons[4].ok=true;break;
        case'laser':weapons[3].ok=true;break;
        case'rapid_fire':weapons[1].ok=true;break;
        case'dash_skill':skills[0].ok=true;break;
        case'shield_skill':skills[1].ok=true;break;
        case'slow_skill':skills[2].ok=true;break;
        case'heal_skill':skills[3].ok=true;break;
        case'aoe_weapon':skills[4].ok=true;break;
        case'nuke':
            enemies.forEach(function(e){if(Math.hypot(e.x-player.x,e.y-player.y)<200)e.hp-=150;});
            explode(player.x,player.y,50);
            shake={amp:12,dur:400};
            playSound('explosion');break;
        case'tank_part':break;
        case'key1':case'key2':break;
    }
    buildUI();
}

function doDash(){
    var dx=mouse.x-player.x,dy=mouse.y-player.y;
    var d=Math.hypot(dx,dy)||1;
    player.x+=(dx/d)*150;player.y+=(dy/d)*150;
    player.inv=true;player.invT=20;
    player.dashCD=skills[0].cd;
    for(var i=0;i<12;i++)particles.push({x:player.x,y:player.y,c:'#74b9ff',vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:15,type:'dash'});
    playSound('teleport');
}

function doShield(){
    player.shield=true;player.shieldT=skills[1].cd/2;
    player.shieldCD=skills[1].cd;
}

function doSlow(){
    enemies.forEach(function(e){e.slowT=3000;});
    player.slowCD=skills[2].cd;
    enemies.forEach(function(e){for(var i=0;i<8;i++)particles.push({x:e.x,y:e.y,c:'#81ecec',vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,type:'slow'});});
}

function doHeal(){
    player.hp=Math.min(player.maxHp,player.hp+40);
    player.healCD=skills[3].cd;
    for(var i=0;i<15;i++)particles.push({x:player.x,y:player.y,c:'#00ff88',vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:25,type:'heal'});
    playSound('pickup');
}

function doAOE(){
    enemies.forEach(function(e){
        var d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d<180){e.hp-=45;e.flash=10;showDmg(45,e.x,e.y);}
    });
    explode(player.x,player.y,35);
    player.aoeCD=skills[4].cd;
    shake={amp:6,dur:250};
    playSound('explosion');
}

function updateParticles(){
    for(var i=particles.length-1;i>=0;i--){
        var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
        p.vx*=0.96;p.vy*=0.96;
        if(p.life<=0)particles.splice(i,1);
    }
}

function showDmg(amt,x,y){
    var el=document.createElement('div');
    el.className='dmg-text';
    el.textContent='-'+amt;
    el.style.left=(canvas.offsetLeft+x)+'px';
    el.style.top=(canvas.offsetTop+y-30)+'px';
    document.body.appendChild(el);
    setTimeout(function(){el.remove();},1000);
}

function updateDamageTexts(){}

function updateUI(){
    document.getElementById('healthFill').style.width=Math.max(0,(player.hp/player.maxHp)*100)+'%';
    document.getElementById('scoreDisplay').textContent=score;
    document.getElementById('killsDisplay').textContent=kills;
}

function updateBossHP(){
    if(!hasBoss)return;
    var boss=null;
    enemies.forEach(function(e){if(e.boss)boss=e;});
    if(boss){
        document.getElementById('bossHealthFill').style.width=Math.max(0,(boss.hp/boss.maxHp)*100)+'%';
        document.getElementById('bossNameLabel').textContent=boss.e+' BOSS '+Math.ceil(boss.hp)+'/'+boss.maxHp;
    }
}

function checkWin(){
    var tx=Math.floor(player.x/TS),ty=Math.floor(player.y/TS);
    if(ty>=0&&ty<gameMap.length&&tx>=0&&tx<gameMap[0].length){
        if(gameMap[ty][tx]==='E'){
            var nxt=LEVELS[curLevel].next;
            if(nxt===-1)victory();
            else{curLevel=nxt;loadLevel(curLevel);showStory(LEVELS[curLevel].story);playSound('teleport');}
        }
    }
}

function showStory(text){
    var pop=document.getElementById('storyPopup');
    pop.textContent=text;
    pop.classList.add('show');
    setTimeout(function(){pop.classList.remove('show');},4000);
}

function gameOver(){
    running=false;
    document.getElementById('endModal').style.display='flex';
    document.getElementById('endTitle').textContent='💔 游戏结束';
    document.getElementById('endText').innerHTML='<strong>小勇士被怪物击败了...</strong><br><br>不要灰心，再试一次吧！<br><br>🎯 击杀数:'+kills+'<br>💰 得分:'+score;
}

function victory(){
    running=false;
    document.getElementById('endModal').style.display='flex';
    document.getElementById('endTitle').textContent='🏆 太棒了！闯关成功！';
    document.getElementById('endText').innerHTML='<strong>恭喜你成功逃出了终极迷宫！</strong><br><br>❤️ 剩余生命:'+Math.round(player.hp)+'/'+player.maxHp+'<br>⚔️ 最终武器:'+weapons[player.wep].n+'<br>☠️ 击杀怪物总数:'+kills+'<br>💰 总得分:'+score+'<br>🏅 完成关卡: 20/20<br><br>🎊 你是真正的迷宫英雄！';
    for(var i=0;i<150;i++){
        setTimeout(function(){
            var c=document.createElement('div');
            c.style.cssText='position:fixed;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;background:hsl('+Math.random()*360+',80%,60%);left:'+Math.random()*100+'vw;top:-15px;border-radius:'+(Math.random()>0.5?'50%':'2px')+';z-index:9999;pointer-events:none;';
            c.style.animation='dmgFloat 3s linear forwards';
            document.body.appendChild(c);
            setTimeout(function(){c.remove();},3000);
        },i*15);
    }
}

function render(){
    ctx.save();
    if(shake.dur>0){
        ctx.translate((Math.random()-0.5)*shake.amp,(Math.random()-0.5)*shake.amp);
        shake.dur-=16;
    }

    var theme=THEMES[LEVELS[curLevel].theme]||THEMES.normal;

    ctx.fillStyle=theme.floor;
    ctx.fillRect(0,0,GW,GH);

    for(var y=0;y<gameMap.length;y++){
        for(var x=0;x<gameMap[y].length;x++){
            var tile=gameMap[y][x];
            if(tile==='#'){
                ctx.fillStyle=theme.wall;
                ctx.fillRect(x*TS,y*TS,TS,TS);
                ctx.strokeStyle='rgba(255,255,255,0.08)';
                ctx.strokeRect(x*TS+1,y*TS+1,TS-2,TS-2);
            } else if(tile==='^'){
                ctx.fillStyle='#e74c3c';
                ctx.fillRect(x*TS,y*TS,TS,TS);
                ctx.fillStyle='#f39c12';
                ctx.beginPath();
                ctx.arc(x*TS+TS/2,y*TS+TS/2,6,0,Math.PI*2);
                ctx.fill();
            } else if(tile==='E'){
                ctx.fillStyle='#00b894';
                ctx.fillRect(x*TS,y*TS,TS,TS);
                ctx.fillStyle='#fff';
                ctx.font='bold 18px Arial';
                ctx.textAlign='center';
                ctx.fillText('🚪',x*TS+TS/2,y*TS+TS/2+6);
            } else if(tile==='T'){
                ctx.fillStyle='#a29bfe';
                ctx.fillRect(x*TS,y*TS,TS,TS);
                ctx.fillText('🌀',x*TS+TS/2,y*TS+TS/2+6);
            }
        }
    }

    items.forEach(function(it){
        if(it.got)return;
        var emoji='';
        switch(it.t){
            case'coin':emoji='🪙';break;
            case'health':emoji='❤️';break;
            case'sword':emoji='⚔️';break;
            case'shotgun':emoji='💥';break;
            case'smg':emoji='⚡';break;
            case'rocket':emoji='🚀';break;
            case'laser':emoji='🔴';break;
            case'dash_skill':emoji='💨';break;
            case'shield_skill':emoji='🛡️';break;
            case'slow_skill':emoji='❄️';break;
            case'heal_skill':emoji='💚';break;
            case'aoe_weapon':emoji='💢';break;
            case'nuke':emoji='☢️';break;
            case'tank_part':emoji='🛡️';break;
            case'key1':case'key2':emoji='🔑';break;
        }
        ctx.font='22px Arial';
        ctx.textAlign='center';
        ctx.fillText(emoji,it.x,it.y+8);
    });

    particles.forEach(function(p){
        ctx.globalAlpha=p.life/30;
        ctx.fillStyle=p.c;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.type==='explosion'?4+p.life/8:3,0,Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha=1;

    ctx.fillStyle=player.shield?'rgba(100,200,255,0.3)':(player.inv&&Math.floor(Date.now()/80)%2)?'rgba(255,255,255,0.4)':'transparent';
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r+4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='#ffd700';
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle='#333';
    ctx.font='16px Arial';
    ctx.textAlign='center';
    ctx.fillText('😊',player.x,player.y+6);

    if(player.shield){
        ctx.strokeStyle='rgba(100,200,255,0.7)';
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(player.x,player.y,player.r+8,0,Math.PI*2);
        ctx.stroke();
    }

    bullets.forEach(function(b){
        ctx.fillStyle=b.color;
        ctx.shadowColor=b.color;
        ctx.shadowBlur=b.expl?10:4;
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur=0;
    });

    enemies.forEach(function(en){
        ctx.save();
        if(en.flash>0){ctx.globalAlpha=0.5;}

        if(en.boss){
            ctx.fillStyle='rgba(255,0,0,0.15)';
            ctx.beginPath();
            ctx.arc(en.x,en.y,en.r+6,0,Math.PI*2);
            ctx.fill();
        }

        if(en.slowT>0){
            ctx.strokeStyle='#81ecec';
            ctx.lineWidth=2;
            ctx.beginPath();
            ctx.arc(en.x,en.y,en.r+4,0,Math.PI*2);
            ctx.stroke();
        }

        ctx.fillStyle=en.c;
        ctx.beginPath();
        ctx.arc(en.x,en.y,en.r,0,Math.PI*2);
        ctx.fill();

        ctx.font=(en.boss?'34':'24')+'px Arial';
        ctx.textAlign='center';
        ctx.fillText(en.e,en.x,en.y+(en.boss?12:8));

        if(en.hp<en.maxHp){
            var bw=en.r*2;
            ctx.fillStyle='#333';
            ctx.fillRect(en.x-bw/2,en.y-en.r-12,bw,5);
            ctx.fillStyle=en.hp>en.maxHp*0.3?'#00b894':'#e74c3c';
            ctx.fillRect(en.x-bw/2,en.y-en.r-12,bw*(en.hp/en.maxHp),5);
            ctx.fillStyle='#fff';
            ctx.font='bold 10px Arial';
            ctx.textAlign='center';
            ctx.fillText(Math.ceil(en.hp)+'/'+en.maxHp,en.x,en.y-en.r-14);
        }

        ctx.restore();
    });

    ctx.restore();
    updateMinimap();
}

function updateMinimap(){
    var ms=4;
    mCtx.fillStyle='rgba(0,0,0,0.8)';
    mCtx.fillRect(0,0,140,140);
    for(var y=0;y<gameMap.length;y++){
        for(var x=0;x<gameMap[y].length;x++){
            if(gameMap[y][x]==='#'){mCtx.fillStyle='#666';mCtx.fillRect(x*ms,y*ms,ms,ms);}
            else if(gameMap[y][x]==='E'){mCtx.fillStyle='#00ff88';mCtx.fillRect(x*ms,y*ms,ms,ms);}
        }
    }
    mCtx.fillStyle='#ffd700';
    mCtx.beginPath();
    mCtx.arc(player.x/TS*ms,player.y/TS*ms,3,0,Math.PI*2);
    mCtx.fill();
    enemies.forEach(function(en){
        mCtx.fillStyle=en.boss?'#ff0000':'#ff6b6b';
        mCtx.beginPath();
        mCtx.arc(en.x/TS*ms,en.y/TS*ms,en.boss?3:2,0,Math.PI*2);
        mCtx.fill();
    });
}

document.addEventListener('keydown',function(e){keys[e.code]=true;});
document.addEventListener('keyup',function(e){keys[e.code]=false;});

console.log('[GAME] 迷宫大冒险加载完成 ✅ | 共'+LEVELS.length+'个关卡');
</script>
